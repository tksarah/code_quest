services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-file:./data/prod.db}
      APP_URL: ${APP_URL:-https://localhost}
      DATA_RETENTION_DAYS: ${DATA_RETENTION_DAYS:-90}
    volumes:
      - app-data:/app/prisma/data
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - web
    environment:
      CADDY_HOSTNAME: ${CADDY_HOSTNAME:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  app-data:
  caddy-data:
  caddy-config:
